# On-demand / scheduled smoke test against production.
# The main CI/CD pipeline already runs E2E after each deploy to main.
# Use this for manual checks or daily cron (uncomment schedule below).
name: E2E Production

on:
  workflow_dispatch:
  # schedule:
  #   - cron: '0 6 * * *'

jobs:
  e2e:
    name: E2E (production)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20', cache: 'npm' }
      - run: npm ci
      - run: npx playwright install chromium --with-deps
      - name: Run E2E
        run: npm run test:e2e
        env:
          BASE_URL: https://www.sealvo.it.com
      - name: Upload report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-production
          path: playwright-report/
          retention-days: 7
      - name: Summary
        if: always()
        run: |
          echo "### E2E Production (manual) — ${{ job.status }}" >> $GITHUB_STEP_SUMMARY
