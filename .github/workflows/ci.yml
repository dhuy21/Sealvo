# Pipeline chính: chạy mỗi push/PR. Không dùng secret — unit + integration tests với mock;
# test nhạy cảm (DB thật, API thật) chạy local hoặc workflow riêng (nightly).
name: CI/CD

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

# Hủy run cũ khi có push/PR mới trên cùng nhánh (tiết kiệm thời gian)
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-test:
    name: Lint & Test
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      NODE_ENV: test
      # Dummy value for session middleware in integration tests; không dùng secret thật trong CI.
      SESSION_SECRET: ci-test-session-secret
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Format check
        run: npm run format:check

      - name: Test
        run: npm test

      - name: CI summary
        run: echo "✅ Lint, format check and tests passed."

  # CD (tùy chọn): dùng khi deploy qua deploy hook (Render, v.v.).
  # Railway + "Wait for CI" → không cần DEPLOY_HOOK_URL; Railway deploy sau khi CI pass.
  deploy:
    name: Deploy (hook optional)
    runs-on: ubuntu-latest
    needs: lint-and-test
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    timeout-minutes: 2
    steps:
      - name: Trigger deploy (deploy hook)
        run: |
          if [ -n "${{ secrets.DEPLOY_HOOK_URL }}" ]; then
            curl -fsS -X POST "${{ secrets.DEPLOY_HOOK_URL }}"
            echo "Deploy hook called."
          else
            echo "DEPLOY_HOOK_URL not set — skip (Railway Wait for CI vẫn deploy khi CI pass)."
          fi
