name: CI/CD

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

# Hủy run cũ khi có push/PR mới trên cùng nhánh (tiết kiệm thời gian)
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Format check
        run: npm run format:check

      - name: Test
        run: npm test

  # CD (tùy chọn): dùng khi bạn deploy qua deploy hook (Render, v.v.).
  # Với Railway + "Wait for CI" thì không cần DEPLOY_HOOK_URL — Railway tự deploy sau khi CI pass.
  deploy:
    runs-on: ubuntu-latest
    needs: lint-and-test
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    steps:
      - name: Trigger deploy (deploy hook)
        run: |
          if [ -n "${{ secrets.DEPLOY_HOOK_URL }}" ]; then
            curl -fsS -X POST "${{ secrets.DEPLOY_HOOK_URL }}"
            echo "Deploy hook called."
          else
            echo "DEPLOY_HOOK_URL not set — skip (Railway Wait for CI vẫn deploy khi CI pass)."
          fi
