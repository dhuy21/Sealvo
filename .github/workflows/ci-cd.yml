# CI/CD pipeline: feature → dev → staging → main
# See docs/BRANCHING-STRATEGY.md for secrets/variables layout.
name: CI/CD

permissions:
  contents: read

on:
  push:
    branches: [main, master, staging, dev, 'feature/**']
  pull_request:
    branches: [main, master, staging, dev]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' && github.ref != 'refs/heads/master' && github.ref != 'refs/heads/staging' }}

jobs:
  # ── 1. LINT & TEST ──────────────────────────────────────────
  lint-and-test:
    name: Lint & Test
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      NODE_ENV: test
      SESSION_SECRET: ci-test-session-secret
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20', cache: 'npm' }
      - run: npm ci
      - name: NPM audit (production deps)
        run: npm audit --audit-level=critical --omit=dev
      - run: npm run lint
      - run: npm run format:check
      - run: npm test

  # ── 2. BUILD, SCAN & PUSH ──────────────────────────────────
  docker-build-push:
    name: Build, Scan & Push
    runs-on: ubuntu-latest
    needs: lint-and-test
    timeout-minutes: 20
    permissions:
      contents: read
      packages: write
    env:
      REGISTRY: ghcr.io
    steps:
      - uses: actions/checkout@v4

      - name: Set image name
        id: image
        run: echo "name=${GITHUB_REPOSITORY,,}" >> $GITHUB_OUTPUT

      - name: Resolve tags
        id: meta
        run: |
          PUSH="false"; TAG="ci"
          IMG="${{ env.REGISTRY }}/${{ steps.image.outputs.name }}"
          TAGS="${IMG}:ci-${{ github.sha }}"

          if [ "${{ github.event_name }}" = "push" ]; then
            case "${{ github.ref }}" in
              refs/heads/main|refs/heads/master)
                PUSH="true"; TAG="latest"
                TAGS="${IMG}:latest,${IMG}:sha-${{ github.sha }}" ;;
              refs/heads/staging)
                PUSH="true"; TAG="staging"
                TAGS="${IMG}:staging,${IMG}:sha-${{ github.sha }}" ;;
            esac
          fi

          echo "push=$PUSH"  >> $GITHUB_OUTPUT
          echo "tags=$TAGS"  >> $GITHUB_OUTPUT
          echo "env_tag=$TAG" >> $GITHUB_OUTPUT

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: ${{ steps.meta.outputs.push }}
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Trivy vulnerability scan
        if: steps.meta.outputs.push == 'true'
        continue-on-error: true
        run: |
          docker run --rm \
            -e TRIVY_USERNAME="${{ github.actor }}" \
            -e TRIVY_PASSWORD="${{ secrets.GITHUB_TOKEN }}" \
            aquasec/trivy:latest image \
              --severity CRITICAL,HIGH --ignore-unfixed --exit-code 0 --format table \
              "${{ env.REGISTRY }}/${{ steps.image.outputs.name }}:${{ steps.meta.outputs.env_tag }}"

      - name: Summary
        if: always()
        run: |
          echo "### Docker Build" >> $GITHUB_STEP_SUMMARY
          echo "- **Branch:** \`${{ github.ref_name }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Pushed:** ${{ steps.meta.outputs.push }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Tags:** \`${{ steps.meta.outputs.tags }}\`" >> $GITHUB_STEP_SUMMARY

  # ── 3a. DEPLOY PRODUCTION ──────────────────────────────────
  deploy-production:
    name: Deploy Production
    runs-on: ubuntu-latest
    needs: [lint-and-test, docker-build-push]
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    timeout-minutes: 15
    environment:
      name: production
      url: https://www.sealvo.it.com
    concurrency:
      group: deploy-production
      cancel-in-progress: false
    steps:
      - name: Redeploy Web
        run: |
          [ -z "$RAILWAY_TOKEN" ] && echo "RAILWAY_TOKEN not set, skip." && exit 0
          npx -y @railway/cli redeploy --service "$RAILWAY_SERVICE_ID" --yes
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
          RAILWAY_SERVICE_ID: ${{ secrets.RAILWAY_SERVICE_ID }}

      - name: Health check (Web)
        run: |
          sleep 30
          for i in 1 2 3 4 5; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://www.sealvo.it.com/health || true)
            echo "Attempt $i: $STATUS"
            [ "$STATUS" = "200" ] && exit 0
            sleep 15
          done
          echo "Health check failed." && exit 1

      - name: Redeploy Worker
        run: |
          [ -z "$RAILWAY_TOKEN" ] && echo "RAILWAY_TOKEN not set, skip." && exit 0
          [ -z "$RAILWAY_WORKER_SERVICE_ID" ] && echo "RAILWAY_WORKER_SERVICE_ID not set, skip." && exit 0
          npx -y @railway/cli redeploy --service "$RAILWAY_WORKER_SERVICE_ID" --yes
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
          RAILWAY_WORKER_SERVICE_ID: ${{ secrets.RAILWAY_WORKER_SERVICE_ID }}

      - name: Summary
        if: always()
        run: |
          echo "### Deploy Production" >> $GITHUB_STEP_SUMMARY
          echo "- **Image:** \`:latest\` (sha-${{ github.sha }})" >> $GITHUB_STEP_SUMMARY
          echo "- **Status:** ${{ job.status }}" >> $GITHUB_STEP_SUMMARY

  # ── 3b. DEPLOY STAGING ─────────────────────────────────────
  deploy-staging:
    name: Deploy Staging
    runs-on: ubuntu-latest
    needs: [lint-and-test, docker-build-push]
    if: github.event_name == 'push' && github.ref == 'refs/heads/staging'
    timeout-minutes: 15
    environment:
      name: staging
      url: ${{ vars.STAGING_URL }}
    concurrency:
      group: deploy-staging
      cancel-in-progress: false
    steps:
      - name: Redeploy Web
        run: |
          [ -z "$RAILWAY_TOKEN" ] && echo "RAILWAY_TOKEN not set, skip." && exit 0
          npx -y @railway/cli redeploy --service "$RAILWAY_SERVICE_ID" --yes
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
          RAILWAY_SERVICE_ID: ${{ secrets.RAILWAY_SERVICE_ID }}

      - name: Health check (Web)
        run: |
          sleep 30
          for i in 1 2 3 4 5; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "${{ vars.STAGING_URL }}/health" || true)
            echo "Attempt $i: $STATUS"
            [ "$STATUS" = "200" ] && exit 0
            sleep 15
          done
          echo "Health check failed." && exit 1

      - name: Redeploy Worker
        run: |
          [ -z "$RAILWAY_TOKEN" ] && echo "RAILWAY_TOKEN not set, skip." && exit 0
          [ -z "$RAILWAY_WORKER_SERVICE_ID" ] && echo "RAILWAY_WORKER_SERVICE_ID not set, skip." && exit 0
          npx -y @railway/cli redeploy --service "$RAILWAY_WORKER_SERVICE_ID" --yes
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
          RAILWAY_WORKER_SERVICE_ID: ${{ secrets.RAILWAY_WORKER_SERVICE_ID }}

      - name: Summary
        if: always()
        run: |
          echo "### Deploy Staging" >> $GITHUB_STEP_SUMMARY
          echo "- **Image:** \`:staging\` (sha-${{ github.sha }})" >> $GITHUB_STEP_SUMMARY
          echo "- **Status:** ${{ job.status }}" >> $GITHUB_STEP_SUMMARY

  # ── 4a. E2E PRODUCTION ─────────────────────────────────────
  e2e-production:
    name: E2E (Production)
    runs-on: ubuntu-latest
    needs: deploy-production
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20', cache: 'npm' }
      - run: npm ci
      - run: npx playwright install chromium --with-deps
      - name: Run E2E
        run: npm run test:e2e
        env:
          BASE_URL: https://www.sealvo.it.com
      - name: Upload report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-production
          path: playwright-report/
          retention-days: 7
      - name: Summary
        if: always()
        run: |
          echo "### E2E Production — ${{ job.status }}" >> $GITHUB_STEP_SUMMARY

  # ── 4b. E2E STAGING ────────────────────────────────────────
  e2e-staging:
    name: E2E (Staging)
    runs-on: ubuntu-latest
    needs: deploy-staging
    if: github.event_name == 'push' && github.ref == 'refs/heads/staging'
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20', cache: 'npm' }
      - run: npm ci
      - run: npx playwright install chromium --with-deps
      - name: Run E2E
        run: npm run test:e2e
        env:
          BASE_URL: ${{ vars.STAGING_URL }}
      - name: Upload report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-staging
          path: playwright-report/
          retention-days: 7
      - name: Summary
        if: always()
        run: |
          echo "### E2E Staging — ${{ job.status }}" >> $GITHUB_STEP_SUMMARY
