# Pipeline chính: chạy mỗi push/PR. Không dùng secret — unit + integration tests với mock;
# test nhạy cảm (DB thật, API thật) chạy local hoặc workflow riêng (nightly).
name: CI/CD

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

# Hủy run cũ khi có push/PR mới trên cùng nhánh (tiết kiệm thời gian)
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-test:
    name: Lint & Test
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      NODE_ENV: test
      # Dummy value for session middleware in integration tests; không dùng secret thật trong CI.
      SESSION_SECRET: ci-test-session-secret
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Format check
        run: npm run format:check

      - name: Test
        run: npm test

      - name: CI summary
        run: echo "✅ Lint, format check and tests passed."

  # CD: deploy bằng Railway CLI trong workflow. Job chỉ xong khi deploy thật sự xong (đồng bộ).
  # Cần: Railway → Project Settings → Tokens → Generate Project Token → GitHub Secrets: RAILWAY_TOKEN
  # Cần: Tắt "Wait for CI" trên Railway (Source) để tránh deploy hai lần.
  # Nếu project có nhiều service: thêm secret RAILWAY_SERVICE_ID = tên hoặc ID service (vd. web_vocab_v0).
  deploy:
    name: Deploy (Railway CLI)
    runs-on: ubuntu-latest
    needs: lint-and-test
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    timeout-minutes: 15
    env:
      RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies (for upload context)
        run: npm ci

      - name: Deploy to Railway
        run: |
          if [ -z "$RAILWAY_TOKEN" ]; then
            echo "RAILWAY_TOKEN not set — skip deploy. Add Project Token in GitHub Secrets to enable."
            exit 0
          fi
          if [ -n "$RAILWAY_SERVICE_ID" ]; then
            npx -y @railway/cli up --ci --service "$RAILWAY_SERVICE_ID"
          else
            npx -y @railway/cli up --ci
          fi
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
          RAILWAY_SERVICE_ID: ${{ secrets.RAILWAY_SERVICE_ID }}

      - name: Deploy summary
        run: echo "Deploy to Railway completed."

  # E2E sau deploy: chạy tự động trong cùng pipeline để verify production ngay sau khi deploy.
  # Chỉ chạy khi vừa deploy (push main/master). Fail thì run đỏ → biết production có thể lỗi.
  e2e-after-deploy:
    name: E2E (production)
    runs-on: ubuntu-latest
    needs: deploy
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers (Chromium)
        run: npx playwright install chromium --with-deps

      - name: Run E2E tests against production
        run: npm run test:e2e
        env:
          BASE_URL: https://www.sealvo.it.com

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

      - name: E2E summary
        run: echo "✅ E2E against production passed."
