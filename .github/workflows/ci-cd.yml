# Pipeline chính: chạy mỗi push/PR. Không dùng secret — unit + integration tests với mock;
# test nhạy cảm (DB thật, API thật) chạy local hoặc workflow riêng (nightly).
name: CI/CD

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

# Hủy run cũ khi có push/PR mới trên cùng nhánh (tiết kiệm thời gian)
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-test:
    name: Lint & Test
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      NODE_ENV: test
      # Dummy value for session middleware in integration tests; không dùng secret thật trong CI.
      SESSION_SECRET: ci-test-session-secret
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Format check
        run: npm run format:check

      - name: Test
        run: npm test

      - name: CI summary
        run: echo "✅ Lint, format check and tests passed."

  # Mô hình B: build image → push GHCR (chỉ khi push main/master) → Railway kéo image.
  # Trên PR: chỉ build để validate Dockerfile, không push.
  docker-build-push:
    name: Build & Push to GHCR
    runs-on: ubuntu-latest
    needs: lint-and-test
    timeout-minutes: 15
    permissions:
      contents: read
      packages: write
    env:
      REGISTRY: ghcr.io
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set image name (lowercase for GHCR)
        run: echo "IMAGE_NAME=${GITHUB_REPOSITORY,,}" >> $GITHUB_ENV

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: ${{ github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master') }}
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:sha-${{ github.sha }}

      - name: Build summary
        run: echo "✅ Build done. Image pushed to GHCR only on push to main/master."

  # CD (Mô hình B): Railway service đã cấu hình "Connect Image" → ghcr.io/OWNER/REPO:latest.
  # Job này trigger redeploy để Railway kéo image mới vừa push lên GHCR.
  # Cần: GitHub Secrets RAILWAY_TOKEN (Project Token); RAILWAY_SERVICE_ID nếu project có nhiều service.
  # Xem docs/DOCKER-MODEL-B.md để cấu hình Railway Connect Image và quyền GHCR.
  deploy:
    name: Deploy (trigger Railway redeploy)
    runs-on: ubuntu-latest
    needs: [lint-and-test, docker-build-push]
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    timeout-minutes: 10
    env:
      RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
    steps:
      - name: Trigger Railway redeploy
        run: |
          if [ -z "$RAILWAY_TOKEN" ]; then
            echo "RAILWAY_TOKEN not set — skip. Add Project Token in GitHub Secrets."
            exit 0
          fi
          if [ -n "$RAILWAY_SERVICE_ID" ]; then
            npx -y @railway/cli redeploy --service "$RAILWAY_SERVICE_ID" --yes
          else
            npx -y @railway/cli redeploy --yes
          fi
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
          RAILWAY_SERVICE_ID: ${{ secrets.RAILWAY_SERVICE_ID }}

      - name: Deploy summary
        run: echo "Railway redeploy triggered; service will pull new image from GHCR."

  # E2E sau deploy: chạy tự động trong cùng pipeline để verify production ngay sau khi deploy.
  # Chỉ chạy khi vừa deploy (push main/master). Fail thì run đỏ → biết production có thể lỗi.
  e2e-after-deploy:
    name: E2E (production)
    runs-on: ubuntu-latest
    needs: deploy
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers (Chromium)
        run: npx playwright install chromium --with-deps

      - name: Run E2E tests against production
        run: npm run test:e2e
        env:
          BASE_URL: https://www.sealvo.it.com

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

      - name: E2E summary
        run: echo "✅ E2E against production passed."
