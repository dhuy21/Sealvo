services:
  app:
    build: .
    container_name: web_vocab_app
    ports:
      - '${HOST_PORT}:${PORT}'
    env_file: .env
    depends_on:
      db:
        condition: service_healthy

  db:
    image: mysql:8.0
    container_name: web_vocab_db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
    ports:
      - '${MYSQLHOST_PORT}:${MYSQLPORT}'
    volumes:
      - db_data:/var/lib/mysql
      - ./app/core/database.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    healthcheck:
      test: ['CMD-SHELL', 'mysqladmin ping -h 127.0.0.1 -P 3306 -uroot -p${MYSQL_ROOT_PASSWORD}']
      interval: 5s
      timeout: 5s
      retries: 15
      start_period: 45s

volumes:
  db_data:
