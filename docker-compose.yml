services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: web_vocab_app
    ports:
      - '${APP_HOST_PORT}:${PORT}'
    # Toutes les variables sont centralisées dans src/.env (un seul fichier).
    env_file:
      - .env
    environment:
      PORT: ${PORT}
      NODE_ENV: ${NODE_ENV}
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT}
      DB_DATABASE: ${DB_DATABASE}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
    depends_on:
      db:
        condition: service_healthy

  db:
    image: mysql:8.0
    container_name: web_vocab_db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
      MYSQL_DATABASE: ${DB_DATABASE}
    # Host 3306 often in use (local MySQL); dùng biến DB_HOST_PORT để linh hoạt host port.
    ports:
      - '${DB_HOST_PORT}:3306'
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ['CMD-SHELL', 'mysqladmin ping -h localhost -uroot -p${DB_PASSWORD}']
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 30s

volumes:
  db_data:
