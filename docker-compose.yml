services:
  app:
    build: .
    container_name: web_vocab_app
    ports:
      - '${HOST_PORT}:${PORT}'
    env_file: .env
    volumes:
      - uploads_data:/app/app/uploads
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  db:
    image: mysql:8.0
    container_name: web_vocab_db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
    ports:
      - '${MYSQLHOST_PORT}:${MYSQLPORT}'
    volumes:
      - db_data:/var/lib/mysql
      - ./migrations/001_initial.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    healthcheck:
      test: ['CMD-SHELL', 'mysqladmin ping -h 127.0.0.1 -P 3306 -uroot -p${MYSQL_ROOT_PASSWORD}']
      interval: 5s
      timeout: 5s
      retries: 15
      start_period: 45s

  redis:
    image: redis:7-alpine
    container_name: web_vocab_redis
    restart: unless-stopped
    command: redis-server --maxmemory-policy volatile-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 5

  worker:
    build: .
    command: ['node', 'worker.js']
    env_file: .env
    restart: unless-stopped
    healthcheck:
      test: ['CMD-SHELL', 'pgrep -f "node worker.js" || exit 1']
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    volumes:
      - uploads_data:/app/app/uploads
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  scheduler:
    build: .
    command: ['node', 'scheduler.js']
    env_file: .env
    restart: unless-stopped
    healthcheck:
      test: ['CMD-SHELL', 'pgrep -f "node scheduler.js" || exit 1']
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    depends_on:
      app:
        condition: service_healthy
      redis:
        condition: service_healthy

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: web_vocab_rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER:-guest}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS:-guest}
    ports:
      - '15672:15672'
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ['CMD', 'rabbitmq-diagnostics', '-q', 'check_port_connectivity']
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 30s

volumes:
  db_data:
  redis_data:
  rabbitmq_data:
  uploads_data:
